name: Auto Update Elon Net Worth

on:
  schedule:
    - cron: '*/30 * * * *'     # Every 30 minutes
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Elon net worth from Forbes
        run: |
          echo "Fetching latest net worth..."

          # More reliable extraction - looks for the large dollar amount on the profile page
          NET=$(curl -s "https://www.forbes.com/profile/elon-musk/" \
            | grep -oE '\$[0-9]{1,3}(,[0-9]{3})*\.[0-9]+B' \
            | head -1 \
            | tr -d '$,B' || echo "834")

          FULL=$((NET * 1000000000))
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          echo "Found: \$${NET}B → ${FULL} dollars"

          cat > elon-net-worth.json << EOF
{
  "netWorth": ${FULL},
  "lastUpdated": "${TIMESTAMP}"
}
EOF

          echo "✅ Successfully wrote new elon-net-worth.json"

      - name: Commit and push update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add elon-net-worth.json
          git commit -m "Auto-update: Elon net worth updated" || echo "No change detected"
          git push
