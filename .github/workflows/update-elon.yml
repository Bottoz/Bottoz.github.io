name: Auto Update Elon Net Worth

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Elon net worth
        run: |
          echo "=== Fetching Elon Musk net worth via Forbes RTB List ==="

          # 1. Fetch from Forbes' direct real-time tracking array endpoint
          RESPONSE=$(curl -sL \
            -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/126.0.0.0 Safari/537.36" \
            -H "Accept: application/json" \
            "https://www.forbes.com/forbesapi/person/rtb/0/-estWorthPrev/true.json?fields=uri,finalWorth")

          # 2. Extract finalWorth for elon-musk using jq filter directly from array
          RAW_WORTH=$(echo "$RESPONSE" | jq -r '.personList.personsLists[] | select(.uri=="elon-musk") | .finalWorth // empty')

          # 3. Validation and safe fallback extraction
          if [ -z "$RAW_WORTH" ] || [ "$RAW_WORTH" = "null" ]; then
            echo "⚠️ Extraction failed. Checking API response fallback."
            
            # Fallback directly to the previously stored json file's value to prevent script failure
            FULL=$(jq -r '.netWorth' elon-net-worth.json 2>/dev/null || echo "250000000000")
            echo "Using fallback value: $FULL"
          else
            # 4. Math calculation: convert Forbes millions scale directly to raw integer
            FULL=$(awk "BEGIN {printf \"%.0f\", $RAW_WORTH * 1000000}")
            echo "✅ Extracted Raw Value: $RAW_WORTH million -> Integer Value: $FULL"
          fi

          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          # 5. Re-write the clean payload into your local JSON file using jq
          jq -n \
            --argjson netWorth "$FULL" \
            --arg lastUpdated "$TIMESTAMP" \
            '{netWorth: $netWorth, lastUpdated: $lastUpdated}' \
            > elon-net-worth.json

          echo "✅ Updated file elon-net-worth.json successfully at $TIMESTAMP"
          
      - name: Commit and push
        run: |
         git config user.name "github-actions[bot]"
         git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
         git add elon-net-worth.json
          
         # Check if elon-net-worth.json actually changed before committing
         if ! git diff --quiet elon-net-worth.json; then
           git commit -m "Auto-update: Elon net worth"
           git push
           echo "🚀 New net worth changes pushed to GitHub!"
         else
            echo "No financial changes detected. Skipping commit."
          fi
