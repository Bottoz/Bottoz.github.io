name: Auto Update Elon Net Worth

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Elon net worth
        run: |
          echo "=== Fetching Elon Musk net worth ==="

          # Download the page
          PAGE=$(curl -sL "https://www.forbes.com/profile/elon-musk/")

          # Extract net worth
          NET=$(echo "$PAGE" | grep -oE '\$[0-9,]+(\.[0-9]+)?B' | head -1 | tr -d '$,B')

          # If extraction fails, use previous value from JSON
          if [ -z "$NET" ]; then
            echo "⚠️ Could not extract value. Using previous value."
            NET=$(jq -r '.netWorth / 1000000000' elon-net-worth.json 2>/dev/null || echo "782")
          fi

          FULL=$((NET * 1000000000))
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')

          echo "Extracted value: $${NET}B"

          # Write JSON file using printf (no heredoc)
          printf '{\n  "netWorth": %s,\n  "lastUpdated": "%s"\n}\n' "$FULL" "$TIMESTAMP" > elon-net-worth.json

          echo "✅ Successfully updated to $${NET}B"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add elon-net-worth.json
          git commit -m "Auto-update: Elon net worth updated" || echo "No change"
          git push
