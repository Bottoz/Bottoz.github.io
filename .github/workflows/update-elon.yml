name: Auto Update Elon Net Worth

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Fetch latest Elon net worth
        run: |
          NET=$(curl -s "https://www.forbes.com/profile/elon-musk/" | grep -oE '\$[0-9]{1,3}(,[0-9]{3})*\.[0-9]+B' | head -1 | tr -d '$,B' || echo "834")
          FULL=$((NET * 1000000000))
          TIMESTAMP=$(date -u +'%Y-%m-%d %H:%M UTC')
          
          printf '{\n  "netWorth": %s,\n  "lastUpdated": "%s"\n}\n' "$FULL" "$TIMESTAMP" > elon-net-worth.json
          
          echo "✅ Updated to $${NET}B"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add elon-net-worth.json
          git commit -m "Auto-update: Elon net worth updated" || echo "No change"
          git push
